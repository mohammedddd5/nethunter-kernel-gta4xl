name: Build Overclocked Nethunter Kernel (gta4xl)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex libssl-dev libcrypto++-dev ccache libncurses-dev git zip unzip curl libgmp-dev libmpfr-dev libmpc-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Download Clang Compiler Toolchain
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git $GITHUB_WORKSPACE/toolchain

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 -b lineage-21 https://github.com/LineageOS/android_kernel_samsung_gta4xl.git $GITHUB_WORKSPACE/kernel

      - name: Inject Overclock, Overvolt & Thermal Bypasses
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          # Inject Overclock
          DVFS_FILE=$(find arch/arm64/boot/dts/ -name "*exynos9611*-dvfs.dtsi" -o -name "*9611*.dtsi" | head -n 1)
          if [ -f "$DVFS_FILE" ]; then
            sed -i 's/khz = <2301000>/khz = <2405000>/g' "$DVFS_FILE"
            sed -i 's/volt = <1150000>/volt = <1225000>/g' "$DVFS_FILE"
            sed -i 's/opp-microvolt = <1150000>/opp-microvolt = <1225000>/g' "$DVFS_FILE"
          fi

          # Bypass Thermal Limits
          find arch/arm64/boot/dts/ -name "*tmu*.dtsi" -o -name "*exynos9611*.dtsi" | while read file; do
            if grep -q "thermal-zones" "$file"; then
              sed -i 's/temperature = <[0-9]*>/temperature = <125000>/g' "$file"
            fi
          done

      - name: Compile the Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          export PATH=$GITHUB_WORKSPACE/toolchain/bin:$PATH
          
          # Clean environment before starting
          make mrproper
          
          # Configure
          if [ -f "arch/arm64/configs/gta4xl_defconfig" ]; then
            make ARCH=arm64 SUBARCH=arm64 gta4xl_defconfig
          else
            make ARCH=arm64 SUBARCH=arm64 exynos9611-gta4xl_defconfig
          fi
          
          # Disable problematic thermal and camera features
          ./scripts/config --disable CONFIG_MEDIA_SUPPORT --disable CONFIG_MEDIA_CAMERA_SUPPORT --disable CONFIG_THERMAL_GOV_STEP_WISE
          
          # Append NetHunter drivers
          cat <<EOT >> .config
          CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y
          CONFIG_NET_RADIO=y
          CONFIG_WIRELESS_EXT=y
          CONFIG_CFG80211=y
          CONFIG_MAC80211=y
          CONFIG_MAC80211_RC_DEFAULT="minstrel_ht"
          CONFIG_ATH_CARDS=y
          CONFIG_ATH9K_HTC=y
          CONFIG_CARL9170=y
          CONFIG_RT2X00=y
          CONFIG_RT2800USB=y
          CONFIG_RTL_CARDS=y
          CONFIG_RTL8187=y
          CONFIG_RTL8192CU=y
          CONFIG_RTL8xxxU=y
          EOT
          
          make ARCH=arm64 SUBARCH=arm64 olddefconfig
          
          # Build with -j4 for speed while keeping memory safe
          make -j4 \
            ARCH=arm64 \
            SUBARCH=arm64 \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            KCFLAGS="-w" \
            LDFLAGS="-O2"

      - name: Package & Upload
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p output
          cp kernel/arch/arm64/boot/Image.gz-dtb output/Image.gz-dtb || cp kernel/arch/arm64/boot/Image output/Image || true
          
      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Final-Kernel-Build
          path: output/*
