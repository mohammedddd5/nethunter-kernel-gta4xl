name: Build Overclocked Nethunter Kernel (Android 16)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex libssl-dev libcrypto++-dev ccache libncurses-dev git zip unzip curl libgmp-dev libmpfr-dev libmpc-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi clang lld llvm

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_samsung_gta4xl.git $GITHUB_WORKSPACE/kernel

      - name: Inject Overclock & Thermal Bypasses
        run: |
          cd $GITHUB_WORKSPACE/kernel
          # List files to find the correct path for our next attempt
          echo "Listing dts files to identify targets..."
          find arch/arm64/boot/dts -name "*.dtsi" | head -n 20
          
          # Attempt to find the dvfs file using a broader pattern
          DVFS_FILE=$(find arch/arm64/boot/dts -name "*dvfs*" -o -name "*exynos9611*" | head -n 1)
          
          if [ -f "$DVFS_FILE" ]; then
            sed -i 's/2301000/2405000/g' "$DVFS_FILE"
            sed -i 's/1150000/1225000/g' "$DVFS_FILE"
            echo "Successfully patched $DVFS_FILE"
          else
            echo "DVFS file not found with current pattern, skipping..."
          fi

      - name: Compile the Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export LLVM=1
          export LLVM_IAS=1
          
          # Use a direct path if defconfig is not found, or use a broad find
          make gta4xl_defconfig || make defconfig
          
          # Disable problematic drivers
          ./scripts/config --disable CONFIG_MEDIA_SUPPORT
          
          # Build
          make -j$(nproc) KCFLAGS="-w"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-16-Kernel-Build
          path: kernel/arch/arm64/boot/Image.gz-dtb
