name: Build Overclocked Nethunter Kernel (gta4xl)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex libssl-dev libcrypto++-dev ccache libncurses-dev git zip unzip curl libgmp-dev libmpfr-dev libmpc-dev gcc-aarch64-linux-gnu

      - name: Clone Clang Compiler Toolchain
        run: |
          # Clones the optimized Proton Clang toolchain cleanly without extraction hazards
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git $GITHUB_WORKSPACE/toolchain

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 -b lineage-21 https://github.com/LineageOS/android_kernel_samsung_gta4xl.git $GITHUB_WORKSPACE/kernel

      - name: Inject Overclock & Overvolt Parameters
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          DVFS_FILE=$(find arch/arm64/boot/dts/ -name "*exynos9611*-dvfs.dtsi" -o -name "*9611*.dtsi" | head -n 1)
          
          if [ -f "$DVFS_FILE" ]; then
            echo "Modifying clock frequencies and voltage steps in: $DVFS_FILE"
            sed -i 's/khz = <2301000>/khz = <2405000>/g' "$DVFS_FILE"
            sed -i 's/volt = <1150000>/volt = <1225000>/g' "$DVFS_FILE"
            sed -i 's/opp-microvolt = <1150000>/opp-microvolt = <1225000>/g' "$DVFS_FILE"
            echo "Successfully injected custom hardware profiles!"
          else
            echo "WARNING: Core DVFS device tree map not found via automation. Compiling with default fallback frequencies."
          fi

      - name: Configure Kernel Flags (Strip Cameras & Enable Nethunter)
        run: |
          cd $GITHUB_WORKSPACE/kernel
          export PATH=$GITHUB_WORKSPACE/toolchain/bin:$PATH
          
          if [ -f "arch/arm64/configs/gta4xl_defconfig" ]; then
            make ARCH=arm64 SUBARCH=arm64 gta4xl_defconfig
          elif [ -f "arch/arm64/configs/exynos9611-gta4xl_defconfig" ]; then
            make ARCH=arm64 SUBARCH=arm64 exynos9611-gta4xl_defconfig
          else
            ANY_DEFCONFIG=$(ls arch/arm64/configs/ | grep -i gta4xl | head -n 1)
            make ARCH=arm64 SUBARCH=arm64 "$ANY_DEFCONFIG"
          fi
          
          # Use scripts/config to completely disable camera, multimedia, and TV tuner subsystems
          ./scripts/config --disable CONFIG_MEDIA_SUPPORT
          ./scripts/config --disable CONFIG_MEDIA_CAMERA_SUPPORT
          ./scripts/config --disable CONFIG_VIDEO_DEV
          ./scripts/config --disable CONFIG_VIDEO_SAMSUNG_FIMC
          
          # Append NetHunter external Wi-Fi drivers and performance profiles
          cat <<EOT >> .config
          CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y
          CONFIG_SUBST_WCHAR=y
          CONFIG_NET_RADIO=y
          CONFIG_WIRELESS_EXT=y
          CONFIG_WEXT_CORE=y
          CONFIG_WEXT_PROC=y
          CONFIG_WEXT_SPY=y
          CONFIG_WEXT_PRIV=y
          CONFIG_CFG80211=y
          CONFIG_MAC80211=y
          CONFIG_MAC80211_RC_DEFAULT="minstrel_ht"
          CONFIG_ATH_CARDS=y
          CONFIG_ATH9K_HTC=y
          CONFIG_ATH9K_HTC_DEBUGFS=y
          CONFIG_CARL9170=y
          CONFIG_USB_NET_RNDIS_WLAN=y
          CONFIG_RT2X00=y
          CONFIG_RT2800USB=y
          CONFIG_RT2800USB_RT35XX=y
          CONFIG_RT2800USB_RT53XX=y
          CONFIG_RT2800USB_RT55XX=y
          CONFIG_RT2800USB_UNKNOWN=y
          CONFIG_RTL_CARDS=y
          CONFIG_RTL8187=y
          CONFIG_RTL8192CU=y
          CONFIG_RTL8xxxU=y
          EOT
          
          make ARCH=arm64 SUBARCH=arm64 olddefconfig

      - name: Compile the Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          export PATH=$GITHUB_WORKSPACE/toolchain/bin:$PATH
          
          make -j$(nproc --all) \
            ARCH=arm64 \
            SUBARCH=arm64 \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            KCFLAGS="-w"

      - name: Package Kernel Image
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p output
          cp kernel/arch/arm64/boot/Image.gz-dtb output/Image.gz-dtb || cp kernel/arch/arm64/boot/Image output/Image || true
          
      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Overclocked-Nethunter-Kernel
          path: output/*
