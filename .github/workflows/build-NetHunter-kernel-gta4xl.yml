name: Build Overclocked Nethunter Kernel (Android 16)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex libssl-dev libcrypto++-dev ccache libncurses-dev git zip unzip curl libgmp-dev libmpfr-dev libmpc-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi clang lld llvm

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_samsung_gta4xl.git $GITHUB_WORKSPACE/kernel

      - name: Patch Kernel Headers
        run: |
          cd $GITHUB_WORKSPACE/kernel
          # Fix the void void error
          sed -i 's/static inline void void sl_softirq_entry/static inline void sl_softirq_entry/g' include/linux/nmi.h
          # Fix the missing ZONE_DMA definition by appending it if missing
          echo "#define ZONE_DMA 0" >> include/linux/mmzone.h

      - name: Inject Overclock
        run: |
          cd $GITHUB_WORKSPACE/kernel
          DVFS_FILE=$(find arch/arm64/boot/dts -name "*dvfs*" -o -name "*exynos9611*" | head -n 1)
          if [ -f "$DVFS_FILE" ]; then
            sed -i 's/2301000/2405000/g' "$DVFS_FILE"
            sed -i 's/1150000/1225000/g' "$DVFS_FILE"
          fi

      - name: Compile the Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          # Environment variables for build
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export LLVM=1
          export LLVM_IAS=1
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          # Use defconfig found dynamically
          CONFIG_FILE=$(find arch/arm64/configs/ -name "*gta4xl*_defconfig" | head -n 1)
          make ARCH=arm64 "$CONFIG_FILE"
          
          # KCFLAGS forces the compiler to ignore modern strict standards
          export KCFLAGS="-w -Wno-error -fno-integrated-as -std=gnu89"
          
          # Build
          make -j$(nproc) ARCH=arm64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-16-Kernel-Build
          path: kernel/arch/arm64/boot/Image.gz-dtb
