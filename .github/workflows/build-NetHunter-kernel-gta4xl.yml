name: Build Overclocked Nethunter Kernel (Android 16)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04 # Android 16 requires the latest headers provided by Ubuntu 24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex libssl-dev libcrypto++-dev ccache libncurses-dev git zip unzip curl libgmp-dev libmpfr-dev libmpc-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi clang lld llvm

      - name: Clone Kernel Source
        run: |
          # Ensure we are pulling the correct branch for Android 16
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_samsung_gta4xl.git $GITHUB_WORKSPACE/kernel

      - name: Inject Overclock & Thermal Bypasses
        run: |
          cd $GITHUB_WORKSPACE/kernel
          # Frequency/Volt Injection
          DVFS_FILE=$(find arch/arm64/boot/dts/ -name "*exynos9611*-dvfs.dtsi" | head -n 1)
          sed -i 's/2301000/2405000/g' "$DVFS_FILE"
          sed -i 's/1150000/1225000/g' "$DVFS_FILE"
          # Thermal Bypass
          find arch/arm64/boot/dts/ -name "*.dtsi" | xargs sed -i 's/temperature = <[0-9]*>/temperature = <125000>/g'

      - name: Compile the Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          # Use modern build flags for Android 16
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export LLVM=1
          export LLVM_IAS=1
          
          # Configuration
          make gta4xl_defconfig
          
          # Disable problematic drivers that crash on Android 16
          ./scripts/config --disable CONFIG_MEDIA_SUPPORT
          
          # Build
          make -j$(nproc) KCFLAGS="-w"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-16-Kernel
          path: kernel/arch/arm64/boot/Image.gz-dtb
