name: Build Overclocked Nethunter Kernel (Android 16)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex libssl-dev libcrypto++-dev ccache libncurses-dev git zip unzip curl libgmp-dev libmpfr-dev libmpc-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi clang lld llvm

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_samsung_gta4xl.git $GITHUB_WORKSPACE/kernel

      - name: Patch Kernel Headers for Modern Clang
        run: |
          cd $GITHUB_WORKSPACE/kernel
          # 1. Fix the double-void declaration in nmi.h
          sed -i 's/static inline void void/static inline void/g' include/linux/nmi.h
          # 2. Add ZONE_DMA definition to mmzone.h to fix undeclared identifier
          sed -i '/#define _LINUX_MMZONE_H/a #define ZONE_DMA 0' include/linux/mmzone.h

      - name: Inject Overclock
        run: |
          cd $GITHUB_WORKSPACE/kernel
          # Patching the specific file found in your logs
          TARGET_FILE="arch/arm64/boot/dts/samsung/exynos9611-gta4xlwifi_eur_open_gpio_05.dtsi"
          if [ -f "$TARGET_FILE" ]; then
            sed -i 's/2301000/2405000/g' "$TARGET_FILE"
            sed -i 's/1150000/1225000/g' "$TARGET_FILE"
          fi

      - name: Compile the Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          # Standard Android Build Variables
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export LLVM=1
          export LLVM_IAS=1
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          # Force use of the exynos9611 target configuration
          make ARCH=arm64 exynos9611_defconfig
          
          # KCFLAGS to silence warnings and bypass errors
          export KCFLAGS="-w -Wno-error -fno-integrated-as"
          
          # Build
          make -j$(nproc) ARCH=arm64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-16-Kernel-Build
          path: kernel/arch/arm64/boot/Image.gz-dtb
