name: Build Overclocked Nethunter Kernel (Android 16)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex libssl-dev libcrypto++-dev ccache libncurses-dev git zip unzip curl libgmp-dev libmpfr-dev libmpc-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi clang lld llvm

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_samsung_gta4xl.git $GITHUB_WORKSPACE/kernel

      - name: Inject Overclock & Thermal Bypasses
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          # 1. Targeted Overclock Injection
          # We search for any dtsi containing dvfs and verify the file before modifying
          find . -name "*dvfs*.dtsi" -exec sed -i 's/2301000/2405000/g' {} +
          find . -name "*dvfs*.dtsi" -exec sed -i 's/1150000/1225000/g' {} +
          
          # 2. Thermal Bypass
          # Only target files that actually have thermal-zones to avoid "no such file" errors
          find . -type f -name "*.dtsi" -exec grep -l "thermal-zones" {} + | while read -r file; do
            sed -i 's/temperature = <[0-9]*>/temperature = <125000>/g' "$file"
          done

      - name: Compile the Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          # Environment variables for Android 16/LLVM build
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export LLVM=1
          export LLVM_IAS=1
          
          # Dynamically locate the defconfig
          DEFCONFIG=$(find arch/arm64/configs/ -name "*gta4xl*_defconfig" | head -n 1)
          make "$DEFCONFIG"
          
          # Disable problematic drivers
          ./scripts/config --disable CONFIG_MEDIA_SUPPORT
          
          # Build with adaptive parallel jobs
          make -j$(nproc) KCFLAGS="-w"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-16-Kernel-Build
          path: kernel/arch/arm64/boot/Image.gz-dtb
